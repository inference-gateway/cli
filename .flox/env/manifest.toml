schema-version = "1.13.0"

[vars]
GOPATH = "$HOME/go"
GOPROXY = "https://proxy.golang.org,direct"
GOSUMDB = "sum.golang.org"
GO111MODULE = "on"
CGO_ENABLED = "1"
NPM_CONFIG_PREFIX = "$FLOX_ENV_PROJECT/.flox/npm"
NODE_PATH = "$FLOX_ENV_PROJECT/.flox/npm/lib/node_modules"

[install]
go.pkg-path = "go"
go.version = "^1.26.2"
nodejs.pkg-path = "nodejs_24"
nodejs.version = "^24.15.0"
git.pkg-path = "git"
git.version = "^2.53.0"
git.outputs = "all"
gh.pkg-path = "gh"
gh.version = "^2.92.0"
golangci-lint.pkg-path = "golangci-lint"
golangci-lint.version = "^2.12.2"
pre-commit.pkg-path = "pre-commit"
pre-commit.version = "^4.5.1"
pre-commit.pkg-group = "pre-commit"
pre-commit.outputs = "all"
go-task.pkg-path = "go-task"
go-task.version = "^3.48.0"
ripgrep.pkg-path = "ripgrep"
ripgrep.version = "^15.1.0"
markdownlint-cli.pkg-path = "markdownlint-cli"
markdownlint-cli.version = "^0.48.0"
docker.pkg-path = "docker"
docker.version = "^29.5.2"
docker-compose.pkg-path = "docker-compose"
docker-compose.version = "^5.1.4"
gopls.pkg-path = "gopls"
gopls.version = "0.22.0"
infer.flake = "github:inference-gateway/cli/v0.125.0"
claude-code.pkg-path = "claude-code"
claude-code.version = "^2.1.177"
claude-code.pkg-group = "claude-code"
codex.pkg-path = "codex"
codex.version = "^0.139.0"
codex.pkg-group = "codex"
whisper-cpp.pkg-path = "whisper-cpp"
whisper-cpp.version = "1.8.4"
ffmpeg.pkg-path = "ffmpeg"
ffmpeg.version = "8.1"

[hook]
on-activate = '''
  export PATH="$HOME/go/bin:$PATH"
'''
