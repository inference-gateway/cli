apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-gateway
  namespace: infer-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-gateway
  template:
    metadata:
      labels:
        app: inference-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/inference-gateway/inference-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_READ_TIMEOUT
              value: "230s"
            - name: SERVER_WRITE_TIMEOUT
              value: "230s"
            - name: SERVER_IDLE_TIMEOUT
              value: "230s"
            - name: CLIENT_TIMEOUT
              value: "230s"
          resources:
            limits:
              memory: 512Mi
              cpu: 1
            requests:
              memory: 256Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: inference-gateway
  namespace: infer-system
spec:
  selector:
    app: inference-gateway
  ports:
    - port: 8080
      targetPort: 8080
