apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: infer-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.130.0
          args:
            - --config
            - /etc/otelcol-contrib/config.yaml
          ports:
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: infer-system
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: mock-agent
              scrape_interval: 10s
              static_configs:
                - targets:
                    - mock-agent.infer-agents:9090
    exporters:
      debug: {}
      otlphttp:
        endpoint: http://inference-gateway.infer-system:4318
        retry_on_failure:
          enabled: true
    service:
      pipelines:
        traces:
          receivers:
            - otlp
          exporters:
            - debug
            - otlphttp
        metrics:
          receivers:
            - otlp
            - prometheus
          exporters:
            - debug
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: infer-system
spec:
  selector:
    app: otel-collector
  ports:
    - name: grpc
      port: 4317
      targetPort: 4317
    - name: http
      port: 4318
      targetPort: 4318
