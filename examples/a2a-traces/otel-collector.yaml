---
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: mock-agent
          scrape_interval: 10s
          static_configs:
            - targets:
                - mock-agent:9090

exporters:
  debug: {}
  otlphttp:
    endpoint: http://cli:4318
    retry_on_failure:
      enabled: true

service:
  pipelines:
    traces:
      receivers:
        - otlp
      exporters:
        - debug
        - otlphttp
    metrics:
      receivers:
        - otlp
        - prometheus
      exporters:
        - debug
