---
services:
  inference-gateway:
    image: ghcr.io/inference-gateway/inference-gateway:latest
    pull_policy: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped

  infer-channels-manager:
    image: ghcr.io/inference-gateway/cli:latest
    pull_policy: always
    depends_on:
      - inference-gateway
    env_file:
      - .env
    environment:
      INFER_GATEWAY_URL: http://inference-gateway:8080
      INFER_GATEWAY_RUN: false
      INFER_CHANNELS_ENABLED: true
      INFER_CHANNELS_TELEGRAM_ENABLED: true
      INFER_TOOLS_ENABLED: false
      INFER_A2A_ENABLED: false
      INFER_AGENT_MODEL: deepseek/deepseek-chat
      INFER_AGENT_SYSTEM_PROMPT: |
        You are an helpful assistant
      INFER_AGENT_SYSTEM_PROMPT_WITH_DEFAULTS: false
    volumes:
      - ./tmp:/home/infer
      - ../../dist/infer-linux-arm64:/usr/local/bin/infer
    command:
      - channels-manager
    restart: unless-stopped
