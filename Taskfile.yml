version: '3'

vars:
  BINARY_NAME: infer
  MAIN_PACKAGE: .
  VERSION:
    sh: echo "${VERSION:-$(git describe --tags --always --dirty 2>/dev/null || echo "dev")}"
  COMMIT:
    sh: echo "${COMMIT:-$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")}"
  DATE:
    sh: echo "${DATE:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the CLI binary
    cmds:
      - go build -ldflags "-w -s -X github.com/inference-gateway/cli/cmd.version={{.VERSION}}" -o {{.BINARY_NAME}} {{.MAIN_PACKAGE}}
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY_NAME}}"

  install:
    desc: Install the CLI from source
    cmds:
      - go build -ldflags "-w -s -X github.com/inference-gateway/cli/cmd.version={{.VERSION}}" -o $(go env GOPATH)/bin/{{.BINARY_NAME}} {{.MAIN_PACKAGE}}

  build:mockgateway:
    desc: Build the mock inference-gateway binary for manual and terminal-automation testing
    cmds:
      - mkdir -p .infer/bin
      - go build -o .infer/bin/mock-gateway ./tests/mockgateway

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}} .infer/bin/mock-gateway
      - go clean

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:verbose:
    desc: Run tests with verbose output
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -cover ./...

  test:race:
    desc: Run all tests with the race detector
    cmds:
      - go test -race ./...

  test:e2e:
    desc: Run hermetic end-to-end tests of the built CLI against the mock gateway
    cmds:
      - go test -race -tags e2e -timeout 5m ./tests/e2e/...

  lint:
    desc: Run linter (requires golangci-lint)
    cmds:
      - golangci-lint run
      - markdownlint . --fix

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  mod:tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  mod:download:
    desc: Download go modules
    cmds:
      - go mod download

  verify:deps:
    desc: Verify Go dependencies
    cmds:
      - |
        echo "Checking Go version..."
        go version
        echo ""
        echo "Checking dependencies..."
        go mod verify
        echo "✓ All dependencies verified"
        echo ""
        echo "Note: This CLI uses pure Go dependencies (no CGO required)"

  run:
    desc: Run the CLI locally
    cmds:
      - go run {{.MAIN_PACKAGE}} {{.CLI_ARGS}}

  run:status:
    desc: Run status command locally
    cmds:
      - go run {{.MAIN_PACKAGE}} status

  run:version:
    desc: Run version command locally
    cmds:
      - go run {{.MAIN_PACKAGE}} version

  run:help:
    desc: Show CLI help
    cmds:
      - go run {{.MAIN_PACKAGE}} --help

  release:build:
    desc: Build release binary for current platform only
    cmds:
      - mkdir -p dist
      - |
        echo "Building for native platform..."
        GOOS=$(go env GOOS)
        GOARCH=$(go env GOARCH)
        go build -ldflags "-w -s -X github.com/inference-gateway/cli/cmd.version={{.VERSION}}" -o dist/{{.BINARY_NAME}}-${GOOS}-${GOARCH} {{.MAIN_PACKAGE}}
        echo "✓ Built dist/{{.BINARY_NAME}}-${GOOS}-${GOARCH}"
      - cd dist && sha256sum {{.BINARY_NAME}}-* > checksums.txt
      - |
        if command -v cosign >/dev/null 2>&1; then
          cd dist && cosign sign-blob --yes --output-signature checksums.txt.sig --output-certificate checksums.txt.pem checksums.txt
          echo "✓ Signed checksums with cosign"
        else
          echo "⚠ cosign not found, skipping signature (install cosign for signed releases)"
        fi

  release:build:darwin:
    desc: Build macOS binary
    vars:
      GOARCH:
        sh: go env GOARCH
    cmds:
      - mkdir -p dist
      - GOOS=darwin GOARCH={{.GOARCH}} go build -ldflags "-w -s -X github.com/inference-gateway/cli/cmd.version={{.VERSION}}" -o dist/{{.BINARY_NAME}}-darwin-{{.GOARCH}} {{.MAIN_PACKAGE}}

  release:build:linux:
    desc: Build portable Linux binary using Docker
    vars:
      GOARCH:
        sh: go env GOARCH
    cmds:
      - mkdir -p dist
      - |
        echo "Building portable Linux binary using Docker..."
        docker run --rm \
          -v "{{.PWD}}":/build \
          -w /build \
          golang:1.26-alpine \
          sh -c 'CGO_ENABLED=0 GOOS=linux GOARCH={{.GOARCH}} \
            go build \
            -ldflags "-w -s -X github.com/inference-gateway/cli/cmd.version={{.VERSION}}" \
            -o dist/{{.BINARY_NAME}}-linux-{{.GOARCH}} .'
        echo "✓ Built portable dist/{{.BINARY_NAME}}-linux-{{.GOARCH}} (pure Go, all storage backends supported)"

  release:build:windows:
    desc: Build Windows binary (cross-compiled, pure Go)
    vars:
      GOARCH:
        sh: go env GOARCH
    cmds:
      - mkdir -p dist
      - CGO_ENABLED=0 GOOS=windows GOARCH={{.GOARCH}} go build -ldflags "-w -s -X github.com/inference-gateway/cli/cmd.version={{.VERSION}}" -o dist/{{.BINARY_NAME}}-windows-{{.GOARCH}} {{.MAIN_PACKAGE}}
      - echo "✓ Built dist/{{.BINARY_NAME}}-windows-{{.GOARCH}}"

  container:build:
    desc: Build container image locally for testing
    cmds:
      - task: release:build
      - task: release:build:linux
      - |
        docker build \
          --build-context binaries=dist/ \
          --build-arg VERSION={{.VERSION}} \
          --build-arg REVISION={{.COMMIT}} \
          --build-arg BUILD_DATE={{.DATE}} \
          -t ghcr.io/inference-gateway/cli:local \
          -f Dockerfile \
          .

  container:push:
    desc: Push pre-built container images to registry
    vars:
      PUSH_LATEST:
        sh: echo "${PUSH_LATEST:-true}"
      LATEST_TAG:
        sh: |
          if [ "{{.PUSH_LATEST}}" = "true" ]; then
            echo "-t ghcr.io/inference-gateway/cli:latest"
          else
            echo ""
          fi
    cmds:
      - |
        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          --push \
          -t ghcr.io/inference-gateway/cli:{{.VERSION}} \
          {{.LATEST_TAG}} \
          --build-context binaries=dist/ \
          --build-arg VERSION={{.VERSION}} \
          --build-arg REVISION={{.COMMIT}} \
          --build-arg BUILD_DATE={{.DATE}} \
          --annotation "index:org.opencontainers.image.title=Inference Gateway CLI" \
          --annotation "index:org.opencontainers.image.description=A powerful command-line interface for managing and interacting with the Inference Gateway. Provides interactive chat, autonomous agent capabilities, and extensive tool execution for AI models." \
          --annotation "index:org.opencontainers.image.vendor=Inference Gateway" \
          --annotation "index:org.opencontainers.image.authors=Inference Gateway Team" \
          --annotation "index:org.opencontainers.image.url=https://github.com/inference-gateway/cli" \
          --annotation "index:org.opencontainers.image.documentation=https://github.com/inference-gateway/cli#readme" \
          --annotation "index:org.opencontainers.image.source=https://github.com/inference-gateway/cli" \
          --annotation "index:org.opencontainers.image.licenses=Apache-2.0" \
          --annotation "index:org.opencontainers.image.version={{.VERSION}}" \
          --annotation "index:org.opencontainers.image.revision={{.COMMIT}}" \
          --annotation "index:org.opencontainers.image.created={{.DATE}}" \
          -f Dockerfile \
          .

  precommit:install:
    desc: Install pre-commit hooks
    cmds:
      - pre-commit install

  precommit:run:
    desc: Run pre-commit on all files
    cmds:
      - pre-commit run --all-files

  mocks:generate:
    desc: Generate mocks using counterfeiter
    cmds:
      - mkdir -p tests/mocks/domain
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain Tool
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain ToolService
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain FileService
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain ImageService
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain WebSearchService
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain WebFetchService
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain GitHubIssueService
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain GitHubSetupService
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain SkillsService
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain AgentService
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain ModelService
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain ThemeService
      - go run github.com/maxbrunsfeld/counterfeiter/v6 -o tests/mocks/domain internal/domain ConversationRepository
