name: Nix Auto-fix Hashes

concurrency:
  group: nix-fix-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/nix-fix-hashes.yml'

permissions:
  contents: write
  pull-requests: write
  id-token: read

jobs:
  fix-hashes:
    name: Auto-fix Nix hashes
    runs-on: ubuntu-24.04
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v3.2.0
        id: app_token
        with:
          client-id: ${{ secrets.BOT_GH_APP_ID }}
          private-key: ${{ secrets.BOT_GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Get GitHub App User ID
        id: get_user_id
        run: echo "user_id=$(gh api "/users/${{ steps.app_token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}

      - name: Checkout PR branch
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ steps.app_token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Detect hash mismatches
        id: check
        run: nix flake check -L
        continue-on-error: true

      - name: Auto-fix hashes and push
        if: steps.check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          determinate-nixd fix hashes --auto-apply flake.nix
          if git diff --quiet; then
            echo "No hash fixes needed (build failed for a different reason)"
            exit 1
          fi

          git config user.name "${{ steps.app_token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.get_user_id.outputs.user_id }}+${{ steps.app_token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore(nix): auto-fix vendorHash [dependabot skip]"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
