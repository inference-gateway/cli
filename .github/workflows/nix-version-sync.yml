name: Nix Version Sync

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to sync (e.g., 0.103.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-nix-version:
    name: Update Nix flake version
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version to sync: $VERSION"

      - name: Update version in flake.nix
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/version = \"[0-9.]*\";/version = \"$VERSION\";/" flake.nix
          echo "Updated flake.nix with version $VERSION"
          grep -n 'version = "' flake.nix | head -1

      - name: Calculate vendor hash
        id: vendor-hash
        run: |
          echo "Attempting build to calculate vendorHash..."
          # Use a fake hash to force Nix to report the real one in the error.
          sed -i 's|vendorHash = "sha256-[A-Za-z0-9+/=]*";|vendorHash = lib.fakeHash;|' flake.nix
          BUILD_OUTPUT=$(nix build .#infer --show-trace 2>&1 || true)
          # `got: sha256-<base64>=` is already SRI-formatted in the build error,
          # so we just capture it verbatim.
          VENDOR_HASH=$(echo "$BUILD_OUTPUT" | grep -oP "got:\s+sha256-\K[A-Za-z0-9+/=]+" | head -1)

          if [ -z "$VENDOR_HASH" ]; then
            echo "::error::Failed to calculate vendorHash"
            echo "$BUILD_OUTPUT"
            exit 1
          fi

          echo "Vendor hash: sha256-$VENDOR_HASH"
          echo "hash=$VENDOR_HASH" >> $GITHUB_OUTPUT

      - name: Update vendor hash in flake.nix
        run: |
          VENDOR_HASH="${{ steps.vendor-hash.outputs.hash }}"
          sed -i "s|vendorHash = lib.fakeHash;|vendorHash = \"sha256-$VENDOR_HASH\";|" flake.nix
          echo "Updated vendorHash in flake.nix"

      - name: Format Nix file
        run: |
          nix-shell -p nixfmt-rfc-style --run "nixfmt flake.nix"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(nix): Update flake to v${{ steps.version.outputs.version }}'
          title: 'chore(nix): Update flake to v${{ steps.version.outputs.version }}'
          body: |
            ## Automated Nix Flake Update

            This PR updates the Nix flake to version **${{ steps.version.outputs.version }}**.

            ### Changes
            - Updated `version` to `${{ steps.version.outputs.version }}`
            - Updated `vendorHash` to `sha256-${{ steps.vendor-hash.outputs.hash }}`
            - Formatted with nixfmt-rfc-style

            The `Nix Build Verification` workflow runs on this PR and is the
            authoritative gate for verifying the updated hashes build cleanly.

            ### Verification
            ```bash
            nix build .#infer
            result/bin/infer version
            ```

            ### Related
            - Release: ${{ github.event.release.html_url || 'Manual trigger' }}

            ---
            Auto-generated by `.github/workflows/nix-version-sync.yml`
          branch: chore/nix-update-v${{ steps.version.outputs.version }}
          delete-branch: true
          labels: |
            nix
            dependencies
            automated

      - name: Summary
        run: |
          echo "## Nix Flake Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Vendor Hash**: sha256-${{ steps.vendor-hash.outputs.hash }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A pull request has been created to merge these changes." >> $GITHUB_STEP_SUMMARY
