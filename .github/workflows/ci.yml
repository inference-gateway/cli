---
name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - name: Setup Go
      uses: actions/setup-go@v6.5.0
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Prepare project
      run: |
        go mod tidy
        go fmt ./...

    - name: Check for dirty project
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "Project has uncommitted changes:"
          git status --porcelain
          git diff
          exit 1
        fi
        echo "Project is clean"

  lint:
    needs:
      - prepare
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - name: Setup Go
      uses: actions/setup-go@v6.5.0
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install golangci-lint
      uses: golangci/golangci-lint-action@v9.3.0
      with:
        version: v2.12.2
        args: --timeout=5m

  vet:
    needs:
      - prepare
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - name: Setup Go
      uses: actions/setup-go@v6.5.0
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Run vet
      run: go vet ./...

  build:
    needs:
      - lint
      - vet
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - name: Setup Go
      uses: actions/setup-go@v6.5.0
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Build project
      run: |
        go build \
          -ldflags "\
            -w -s \
            -X github.com/inference-gateway/cli/cmd.version=${{ github.ref_name }}" \
          -o infer .

  test:
    needs:
      - build
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - name: Setup Go
      uses: actions/setup-go@v6.5.0
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Run tests with race detector
      run: go test -race ./...

  e2e:
    needs:
      - build
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - name: Setup Go
      uses: actions/setup-go@v6.5.0
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Run hermetic end-to-end tests against the mock gateway
      run: go test -race -tags e2e -timeout 5m ./tests/e2e/...

  postgres:
    needs:
      - build
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: infer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - name: Setup Go
      uses: actions/setup-go@v6.5.0
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Run storage conformance against PostgreSQL
      env:
        INFER_TEST_POSTGRES_DSN: "host=localhost port=5432 user=postgres password=postgres dbname=infer_test sslmode=disable"
      run: go test -race ./internal/infra/storage/...
