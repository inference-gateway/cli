---
name: Nix

on:
  push:
    branches:
      - main
    paths:
      - flake.nix
      - flake.lock
      - go.mod
      - go.sum
      - .github/workflows/nix.yml
  pull_request:
    branches:
      - main
    paths:
      - flake.nix
      - flake.lock
      - go.mod
      - go.sum
      - .github/workflows/nix.yml

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Validate flake builds
        run: |
          sed -i.bak 's|vendorHash = "[^"]*";|vendorHash = "sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=";|' flake.nix && rm flake.nix.bak
          NEW_HASH=$(nix build .#infer 2>&1 | awk '/got:/ {print $2; exit}')
          if [ -z "$NEW_HASH" ]; then
            echo "ERROR: could not extract vendorHash from nix build output"
            exit 1
          fi
          sed -i.bak "s|vendorHash = \"sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=\";|vendorHash = \"$NEW_HASH\";|" flake.nix && rm flake.nix.bak
          echo "Computed vendorHash: $NEW_HASH"
          nix build .#infer
          ./result/bin/infer version
